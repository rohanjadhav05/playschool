<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FFD600" />
    <meta name="robots" content="index, follow" />

    <!-- Default SEO — overridden per-page by react-helmet-async -->
    <title>Atharva Playschool | Where Little Stars Begin to Shine</title>
    <meta name="description" content="Best playschool and tuition classes in Karve, Karad, Maharashtra. Activity-based learning rooted in Indian values. Admissions open for 2025–26." />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Atharva Playschool" />
    <meta property="og:locale" content="en_IN" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts with display=swap already in URL -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Poppins:wght@400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap"
    />

      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Poppins:wght@400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon placeholder — replace with real favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>" />
  </head>
